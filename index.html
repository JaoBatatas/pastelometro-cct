<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastelômetro CCT - Distribuição Normal</title>
    <!-- Chart.js para o gráfico estatístico -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #ff9800; margin-bottom: 5px; }
        p.subtitle { color: #888; margin-top: 0; font-size: 0.9em; margin-bottom: 25px; }
        
        .btn-pastel {
            background-color: #ff9800;
            color: #121212;
            border: none;
            padding: 20px 40px;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            margin: 10px 0 25px 0;
            width: 100%;
        }
        .btn-pastel:hover { background-color: #e65100; }
        .btn-pastel:active { transform: scale(0.98); }
        .btn-pastel:disabled { background-color: #555; cursor: not-allowed; box-shadow: none; }
        
        .stats-box {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }
        .stat-card {
            background-color: #252525;
            padding: 15px 10px;
            border-radius: 8px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .stat-label { color: #aaa; font-size: 0.85em; margin-bottom: 5px; }
        .stat-val { font-size: 1.3em; font-weight: bold; color: #ffb74d; }
        
        .chart-container {
            position: relative;
            width: 100%;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #loading { color: #ff9800; display: none; margin-top: -15px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🥐 Pastelômetro CCT</h1>
    <p class="subtitle">Análise Preditiva de Salgados da Cantina</p>

    <button class="btn-pastel" onclick="registrarPastel()">Pastel Pronto! 🔔</button>
    <div id="loading">A atualizar modelo estatístico...</div>

    <div class="stats-box">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Média (<span style="font-family: serif; font-size: 1.2em;">μ</span>)</div>
                <div id="val-mu" class="stat-val">--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Mediana</div>
                <div id="val-mediana" class="stat-val">--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Moda</div>
                <div id="val-moda" class="stat-val">--:--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DP Pop. (<span style="font-family: serif; font-size: 1.2em;">σ</span>)</div>
                <div id="val-sigma" class="stat-val">- min</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DP Amostra (<span style="font-family: serif; font-size: 1.2em;">s</span>)</div>
                <div id="val-s" class="stat-val">- min</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Amostras (n)</div>
                <div id="val-total" class="stat-val">0</div>
            </div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="gaussChart"></canvas>
    </div>
</div>

<script>
    // ⚠️ SUBSTITUA PELO URL COPIADO DO SEU GOOGLE APPS SCRIPT
    const API_URL = "https://script.google.com/macros/s/AKfycbwQEP1QPSZ5SrKzPRqw5k-yDI4Junq0_Bx5KUe4Ry94VOjlNslWWx4aB2dEpdRFOBXA/exec";
    
    let chart;

    // Converte minutos acumulados do dia de volta para o formato HH:MM
    function minutosParaHora(minutos) {
        if (minutos === undefined || minutos === null || isNaN(minutos)) return "--:--";
        let h = Math.floor(minutos / 60);
        let m = Math.floor(minutos % 60);
        return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
    }

    // Funções Estatísticas
    function calcularEstatisticas(array) {
        if (!array || array.length === 0) return null;
        let n = array.length;
        
        let soma = array.reduce((a, b) => a + b, 0);
        let mu = soma / n;

        let ordenado = [...array].sort((a, b) => a - b);
        let mediana = n % 2 === 0 
            ? (ordenado[n/2 - 1] + ordenado[n/2]) / 2 
            : ordenado[Math.floor(n/2)];

        let freq = {};
        let maxFreq = 0;
        array.forEach(v => {
            freq[v] = (freq[v] || 0) + 1;
            if (freq[v] > maxFreq) maxFreq = freq[v];
        });
        
        let modaStr = "--:--";
        // Só considera moda se o horário se repetir mais do que uma vez (maxFreq > 1)
        if (maxFreq > 1) {
            let modas = Object.keys(freq).filter(k => freq[k] === maxFreq).map(Number);
            modaStr = modas.map(m => minutosParaHora(m)).join(' e ');
        } else {
            modaStr = "Amodal"; // Nenhum valor se repete
        }

        let varianciaPop = array.reduce((a, b) => a + Math.pow(b - mu, 2), 0) / n;
        let sigma = Math.sqrt(varianciaPop);
        
        let varianciaAmostral = n > 1 ? array.reduce((a, b) => a + Math.pow(b - mu, 2), 0) / (n - 1) : 0;
        let s = Math.sqrt(varianciaAmostral);

        return { mu, mediana, modaStr, sigma, s, total: n };
    }

    // Função matemática da Densidade de Probabilidade da Distribuição Normal
    function funcaoNormal(x, mu, sigma) {
        let expoente = -Math.pow(x - mu, 2) / (2 * Math.pow(sigma, 2));
        return (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(expoente);
    }

    // Gera os dados para plotar a curva de Gauss em tempo real
    function gerarPontosCurva(mu, sigma) {
        let pontos = [];
        let sigmaGrafico = (!sigma || sigma === 0) ? 1 : sigma; // Prevenção de divisão por zero
        
        let margem = Math.max(3 * sigmaGrafico, 60); 
        
        let inicio = mu - margem;
        let fim = mu + margem;
        
        let passo = (fim - inicio) / 200;

        for (let x = inicio; x <= fim; x += passo) {
            pontos.push({
                x: x, 
                y: funcaoNormal(x, mu, sigmaGrafico)
            });
        }
        return pontos;
    }

    // Atualiza a interface e reconstrói o gráfico
    function atualizarDashboard(data) {
        if (!data || data.total === 0) return;

        document.getElementById('val-mu').innerText = `${minutosParaHora(data.mu)}`;
        document.getElementById('val-mediana').innerText = data.mediana ? minutosParaHora(data.mediana) : '--:--';
        document.getElementById('val-moda').innerText = data.modaStr || '--:--';
        
        document.getElementById('val-sigma').innerText = data.sigma ? `${data.sigma.toFixed(1)} min` : '- min';
        document.getElementById('val-s').innerText = data.s ? `${data.s.toFixed(1)} min` : '- min';
        document.getElementById('val-total').innerText = data.total;

        const pontosCurva = gerarPontosCurva(data.mu, data.sigma);
        const ctx = document.getElementById('gaussChart').getContext('2d');

        let gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(255, 152, 0, 0.6)');
        gradient.addColorStop(1, 'rgba(255, 152, 0, 0.0)');

        if (chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Densidade de Probabilidade',
                    data: pontosCurva,
                    borderColor: '#ff9800',
                    backgroundColor: gradient,
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        type: 'linear',
                        title: { display: true, text: 'Horário Previsto', color: '#888', font: { size: 14 } },
                        ticks: {
                            color: '#aaa',
                            maxTicksLimit: 8,
                            callback: function(value) { return minutosParaHora(value); }
                        },
                        grid: { color: 'rgba(255,255,255,0.05)' }
                    },
                    y: { display: false, min: 0 }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleColor: '#ff9800',
                        callbacks: {
                            title: function(context) { return 'Hora: ' + minutosParaHora(context[0].parsed.x); },
                            label: function(context) { return 'Probabilidade relativa: ' + (context.parsed.y * 100).toFixed(2) + '%'; }
                        }
                    }
                }
            }
        });
    }

    // Função para carregar os dados iniciais ao abrir a página
    async function carregarDados() {
        try {
            let res = await fetch(`${API_URL}?action=consultar`);
            let respostaAPI = await res.json(); 
            
            let dados = Array.isArray(respostaAPI) ? calcularEstatisticas(respostaAPI) : respostaAPI;
            atualizarDashboard(dados);
        } catch (err) {
            console.error("Erro ao buscar dados:", err);
        }
    }

    // Função disparada pelo clique do Botão
    async function registrarPastel() {
        const btn = document.querySelector('.btn-pastel');
        const loading = document.getElementById('loading');
        
        btn.disabled = true;
        loading.style.display = 'block';

        try {
            let res = await fetch(`${API_URL}?action=registrar`);
            let respostaAPI = await res.json(); 
            
            let dados = Array.isArray(respostaAPI) ? calcularEstatisticas(respostaAPI) : respostaAPI;
            
            atualizarDashboard(dados);
            alert(`Registado com sucesso! Novo pico teórico (μ): ${minutosParaHora(dados.mu)}`);
        } catch (err) {
            alert("Erro ao guardar o horário. Verifique a ligação com o Apps Script.");
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }

    // Inicializa ao carregar o site
    window.onload = carregarDados;
</script>

</body>
</html>
